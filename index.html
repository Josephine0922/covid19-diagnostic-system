<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>COVID-19 Diagnostic System</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#2c7da0;
  --danger:#c44536;
  --warning:#e68a2e;
  --bg:#eef3f9;
}

*{box-sizing:border-box;margin:0;padding:0;}

body{
  font-family:'Inter',sans-serif;
  background:linear-gradient(135deg,#e9f1f7,#dce6f2);
  padding:20px;
}

/* CARD */
.container{
  max-width:1200px;
  margin:auto;
  background:white;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 20px 50px rgba(0,0,0,0.15);
}

/* HEADER */
.header{
  background:linear-gradient(135deg,#0b2b3b,#1a4a5f);
  color:white;
  padding:20px;
  overflow:hidden;
}

.title{
  font-size:28px;
  font-weight:700;
  white-space:nowrap;
  display:inline-block;
  animation:flow 10s linear infinite;
}

@keyframes flow{
  0%{transform:translateX(-100%);}
  100%{transform:translateX(100%);}
}

/* LAYOUT */
.main{
  display:flex;
  flex-wrap:wrap;
}

.left, .right{
  padding:20px;
}

.left{
  flex:1;
  border-right:1px solid #eee;
}

.right{
  flex:2;
}

/* FORM */
input,select{
  width:100%;
  padding:10px;
  margin-top:5px;
  margin-bottom:15px;
  border-radius:10px;
  border:1px solid #ddd;
}

label{
  font-weight:600;
}

/* SYMPTOMS */
.grid{
  display:grid;
  grid-template-columns:repeat(3, 1fr);
  gap:12px;
  margin-top:10px;
}


.symptom{
  background:#f7fbff;
  padding:10px 14px;
  border-radius:30px;
  display:flex;
  align-items:center;
  gap:10px;
  cursor:pointer;
  font-size:14px;
  line-height:1.2;
  min-height:48px; /* keeps all boxes same height */
}

.symptom span{
  flex:1;
}


.symptom input{
  width:auto;
  margin:0;
}


.symptom:hover{
  background:#e6f3fa;
}

/* RESULT */
.result{
  margin-top:20px;
  padding:20px;
  border-radius:15px;
  background:#f3f8fc;
}

.badge{
  padding:6px 12px;
  border-radius:20px;
  color:white;
  font-size:12px;
  display:inline-block;
  margin-bottom:10px;
}

.result b {
  color:#0b2b3b;
}

/* BUTTON */
button{
  width:100%;
  padding:12px;
  border:none;
  border-radius:30px;
  background:var(--primary);
  color:white;
  font-weight:600;
  cursor:pointer;
}

button:hover{
  background:#1f5e7a;
}

/* MOBILE */
@media(max-width:768px){
  .main{
    flex-direction:column;
  }

  .left{
    border-right:none;
    border-bottom:1px solid #eee;
  }
  

  .grid{
    grid-template-columns:repeat(2, 1fr); /* 2 per row on tablet */
  }
}

@media(max-width:480px){
  .grid{
    grid-template-columns:1fr; /* 1 per row on small phones */
  }

  .title{
    font-size:20px;
    animation:none; /* stops overflow scrolling on small screens */
  }
}

</style>
</head>

<body>



<div class="container">

  <div class="header">
    <div class="title">🦠 COVID-19 DIAGNOSTIC SYSTEM</div>
  </div>

  <div class="main">

    <!-- PATIENT -->
    <div class="left">
      <h3>Patient Info</h3>

      <label>Name</label>
      <input id="name" placeholder="Enter name">

      <label>Age</label>
      <input id="age" type="number">

      <label>Sex</label>
      <select id="sex">
        <option>Male</option>
        <option>Female</option>
      </select>
    </div>

    <!-- SYMPTOMS -->
    <div class="right">
      <h3>Select Symptoms</h3>

        <div class="grid"><label class="symptom"><input type="checkbox" value="High fever"> (high fever + sweating)</label>
        <label class="symptom"><input type="checkbox" value="allergy"> Sneezing / Allergies</label>
        <label class="symptom"><input type="checkbox" value="cold"> Runny nose</label>
        <label class="symptom"><input type="checkbox" value="Stomach pain"> Stomach pain </label>
        <label class="symptom"><input type="checkbox" value="fever"> Fever</label>
        <label class="symptom"><input type="checkbox" value="cough"> Dry cough</label>
        <label class="symptom"><input type="checkbox" value="fatigue"> Fatigue</label>
        <label class="symptom"><input type="checkbox" value="loss"> Loss of smell</label>
        <label class="symptom"><input type="checkbox" value="headache"> Headache</label>
        <label class="symptom"><input type="checkbox" value="throat"> Sore throat</label>
        <label class="symptom"><input type="checkbox" value="aches"> Body aches</label>
        <label class="symptom"><input type="checkbox" value="sob"> Shortness of breath</label>
        <label class="symptom"><input type="checkbox" value="chest"> Chest pain</label>
        <label class="symptom"><input type="checkbox" value="nausea"> Nausea</label>
      </div>

      <button onclick="diagnose()">Analyze</button>

      <div class="result" id="result">
        <p>Diagnosis will appear here...</p>
      </div>

    </div>

  </div>

</div>

<script>
function diagnose(){
  const symptoms=[...document.querySelectorAll("input[type=checkbox]:checked")].map(el=>el.value);
  const age=parseInt(document.getElementById("age").value)||"";
  const name=document.getElementById("name").value||"Patient";

  let stage="",color="",advice="",covidMessage="";

  // Define COVID-related symptoms
  const covidSymptoms = ["fever","cough","fatigue","loss","sob","chest","aches","throat","headache"];

  // Define NON-COVID symptoms
  const nonCovidSymptoms = ["High fever","allergy","cold","Stomach pain"];

  const hasCovid = symptoms.some(s => covidSymptoms.includes(s));
  const onlyNonCovid = symptoms.every(s => nonCovidSymptoms.includes(s));

  if(symptoms.length===0){
    stage="No Symptoms";
    color="gray";
    advice="No illness detected.";
  }

  else if(onlyNonCovid){
    stage="NEGATIVE";
    color="green";
    covidMessage=`
    <div style="
      background:#e6fffa;
      color:#065f46;
      padding:8px 12px;
      border-radius:20px;
      font-weight:600;
      margin-bottom:10px;">
      ✅ Your COVID-19 result is NEGATIVE
    </div>`;
    
  }

  else if(hasCovid){
  covidMessage=`
  <div style="
    background:#ffe5e5;
    color:#b91c1c;
    padding:8px 12px;
    border-radius:20px;
    font-weight:600;
    margin-bottom:10px;">
    ⚠️ Your COVID-19 result is POSITIVE
  </div>`;

  if(symptoms.includes("chest")){
    stage="CRITICAL";
    color="red";
    advice=`
    🚑 <strong>Emergency Care Needed</strong><br>
    - Go to the hospital immediately<br>
    - Oxygen support may be required<br>
    - Doctor may prescribe antiviral drugs
    `;
  }

  else if(symptoms.includes("sob")){
    stage="SEVERE";
    color="red";
    advice=`
    ⚠️ <strong>Severe Case</strong><br>
    Recommended:<br>
    - <b>Paracetamol</b> for fever<br>
    - <b>Vitamin C & Zinc</b><br>
    - Plenty of fluids<br>
    - Seek urgent medical attention
    `;
  }

  else if(symptoms.length>=4){
    stage="MODERATE";
    color="orange";
    advice=`
    💊 <strong>Moderate Case Treatment</strong><br>
    - Paracetamol (for fever & pain)<br>
    - Vitamin C + Zinc supplements<br>
    - Warm fluids (tea, water)<br>
    - Rest and isolate<br>
    - Monitor breathing
    `;
  }

  else{
    stage="MILD";
    color="#2c7da0";
    advice=`
    🏠 <strong>Mild Case Treatment</strong><br>
    - Paracetamol if needed<br>
    - Vitamin C<br>
    - Drink plenty of water<br>
    - Rest well<br>
    - Self-isolate for a few days
    `;
  }
}


  document.getElementById("result").innerHTML=`
    ${covidMessage}
    <div class="badge" style="background:${color}">${stage}</div>
    <p><strong>${name}</strong> (${age} yrs)</p>
    <p>${advice}</p>
  `;
}

</script>

</body>
</html>
